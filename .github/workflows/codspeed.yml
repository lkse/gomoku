name: CodSpeed

# Instruction-level benchmarking: CodSpeed runs the same Criterion benches under
# a CPU simulator, so results are deterministic and independent of runner load,
# unlike the wall-clock `benchmark regression` job in ci.yml. Requires the repo
# to be connected at https://codspeed.io and a `CODSPEED_TOKEN` repository secret.
on:
  push:
    branches:
      - main
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/codspeed.yml"
  pull_request:
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/codspeed.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    name: codspeed
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skips cleanly until you opt in: set repository variable
    # CODSPEED_ENABLED=true (and add the CODSPEED_TOKEN secret) once the repo is
    # connected at codspeed.io. Until then this job is "Skipped", not failed.
    if: vars.CODSPEED_ENABLED == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      - name: Build benchmarks
        run: cargo codspeed build

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v3
        with:
          run: cargo codspeed run
          token: ${{ secrets.CODSPEED_TOKEN }}
