name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

  benchmark-regression:
    name: benchmark regression
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    env:
      BENCH_REGRESSION_THRESHOLD: "0.05"

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name }}
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Benchmark base branch
        working-directory: base
        run: cargo bench -- --save-baseline base

      - name: Copy base benchmark data
        run: |
          mkdir -p head/target
          cp -R base/target/criterion head/target/criterion

      - name: Benchmark pull request
        working-directory: head
        run: cargo bench -- --save-baseline pr

      - name: Check benchmark regression
        working-directory: head
        run: >
          python3 scripts/check_criterion_regression.py
          target/criterion
          --baseline base
          --candidate pr
          --threshold "$BENCH_REGRESSION_THRESHOLD"
